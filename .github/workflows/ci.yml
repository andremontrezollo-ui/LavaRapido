name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend — lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run tsc --noEmit

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  check-env-not-committed:
    name: Security — verify .env is not committed
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fail if .env is tracked by git
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env file is committed to the repository. Remove it with 'git rm --cached .env'."
            exit 1
          fi
          echo "OK: .env is not tracked by git."
