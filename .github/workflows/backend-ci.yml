name: Backend CI

on:
  push:
    branches: [main, develop, 'copilot/**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

# Minimal GITHUB_TOKEN permissions for all jobs
permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --prefer-offline

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --prefer-offline
      - run: npm run lint --if-present

  build:
    name: Build (type-check)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --prefer-offline
      - run: npm run build --if-present || npx tsc --noEmit --skipLibCheck

  migrate:
    name: Validate SQL migrations
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lavarapido_test
          POSTGRES_USER: lavarapido
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Run migrations
        env:
          PGPASSWORD: ci_password
        run: |
          for f in src/infra/database/migrations/*.sql; do
            echo "Running migration: $f"
            psql -h localhost -U lavarapido -d lavarapido_test -f "$f"
          done

  test:
    name: Unit & Integration tests
    needs: migrate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lavarapido_test
          POSTGRES_USER: lavarapido
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://lavarapido:ci_password@localhost:5432/lavarapido_test
      REDIS_URL: redis://localhost:6379
      RATE_LIMIT_MAX: '100'
      RATE_LIMIT_WINDOW: '15'
      JWT_SECRET: ci-test-secret
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --prefer-offline
      - name: Run migrations
        env:
          PGPASSWORD: ci_password
        run: |
          for f in src/infra/database/migrations/*.sql; do
            psql -h localhost -U lavarapido -d lavarapido_test -f "$f"
          done
      - run: npm test

  coverage:
    name: Coverage report
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lavarapido_test
          POSTGRES_USER: lavarapido
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://lavarapido:ci_password@localhost:5432/lavarapido_test
      REDIS_URL: redis://localhost:6379
      RATE_LIMIT_MAX: '100'
      RATE_LIMIT_WINDOW: '15'
      JWT_SECRET: ci-test-secret
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --prefer-offline
      - name: Run migrations
        env:
          PGPASSWORD: ci_password
        run: |
          for f in src/infra/database/migrations/*.sql; do
            psql -h localhost -U lavarapido -d lavarapido_test -f "$f"
          done
      - run: npm run coverage --if-present || npm test -- --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7
