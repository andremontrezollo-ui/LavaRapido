name: Backend CI

on:
  push:
    branches: [main, "copilot/**"]
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

defaults:
  run:
    working-directory: backend

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build --if-present

  migrate:
    name: Migrate (dry run)
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: lavarapido_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run migrations
        env:
          DATABASE_URL: postgres://ci:ci_password@localhost:5432/lavarapido_test
        run: npm run migrate --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run tests
        env:
          APP_ENV: test
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          RATE_LIMIT_MAX: "100"
          RATE_LIMIT_WINDOW: "60000"
        run: npm run test --if-present

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run coverage
        env:
          APP_ENV: test
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          RATE_LIMIT_MAX: "100"
          RATE_LIMIT_WINDOW: "60000"
        run: npm run coverage --if-present
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7
