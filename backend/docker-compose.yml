version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lava_rapido_postgres
    environment:
      POSTGRES_USER: lava_rapido
      POSTGRES_PASSWORD: lava_rapido_secret
      POSTGRES_DB: lava_rapido
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/infra/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lava_rapido -d lava_rapido']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lava_rapido_redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
